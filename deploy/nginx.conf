server {
    listen 80;
    server_name reservehub.example.com;
    root /usr/share/nginx/html;
    index index.html;

    location /api/iam/ {
        proxy_pass http://service-iam:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/core/ {
        proxy_pass http://service-core:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/data/ {
        proxy_pass http://service-data:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/audit/ {
        proxy_pass http://service-audit:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
