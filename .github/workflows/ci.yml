name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            service-core/package-lock.json
            service-iam/package-lock.json
            service-audit/package-lock.json
            service-data/package-lock.json
            frontend/package-lock.json

      - name: Install service-core
        working-directory: service-core
        run: npm ci

      - name: Install service-iam
        working-directory: service-iam
        run: npm ci

      - name: Install service-audit
        working-directory: service-audit
        run: npm ci

      - name: Install service-data
        working-directory: service-data
        run: npm ci

      - name: Unit build and e2e (mocked)
        run: npm run ci

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  integration-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reserveHub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 8
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup database
        run: node scripts/setup-database.mjs
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/reserveHub

      - name: Build and start services
        run: |
          npm ci --prefix service-core
          npm ci --prefix service-iam
          npm ci --prefix service-audit
          npm ci --prefix service-data
          npm run build --prefix service-core
          npm run build --prefix service-iam
          npm run build --prefix service-audit
          npm run build --prefix service-data
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/reserveHub?schema=core JWT_SECRET=ci-secret RABBITMQ_URL=amqp://guest:guest@127.0.0.1:5672 node service-core/dist/src/main.js &
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/reserveHub?schema=iam JWT_SECRET=ci-secret node service-iam/dist/src/main.js &
          MONGODB_URI=mongodb://127.0.0.1:27017/reservehub_audit RABBITMQ_URL=amqp://guest:guest@127.0.0.1:5672 node service-audit/dist/main.js &
          MONGODB_URI=mongodb://127.0.0.1:27017/reservehub_data RABBITMQ_URL=amqp://guest:guest@127.0.0.1:5672 node service-data/dist/main.js &
          sleep 25

      - name: Integration smoke
        run: npm run integration
        env:
          JWT_SECRET: ci-secret

      - name: Integration DB tests (core)
        run: npm run test:e2e --prefix service-core -- --testPathPattern=integration
        env:
          RUN_INTEGRATION_DB: '1'
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/reserveHub?schema=core
          JWT_SECRET: ci-secret
